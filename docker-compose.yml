services:
   # Reverse proxy : NGINX
   nginx:
      image: nginx:alpine
      container_name: nginx
      ports:
         - "80:80"
         - "443:443"
      volumes:
         - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
         - ./certbot/conf:/etc/letsencrypt:ro
         - ./certbot/www:/var/www/certbot:ro
      depends_on:
         - backend
         - frontend
      restart: unless-stopped

   # Backend backend
   backend:
      image: ${DOCKER_USERNAME}/backend:${IMAGE_TAG:-latest}
      container_name: backend
      environment:
         - NODE_ENV=production
         - DB_HOST=mysql
         - DB_USERNAME=${DB_USERNAME}
         - DB_PASSWORD=${DB_PASSWORD}
         - DB_NAME=${DB_NAME}
         - JWT_SECRET=${JWT_SECRET}
         - PORT=${PORT:-3000}
      depends_on:
         mysql:
            condition: service_healthy
      restart: unless-stopped
      deploy:
         resources:
            limits:
               memory: 512M
               cpus: 0.5

   # FRONTEND
   frontend:
      image: ${DOCKER_USERNAME}/frontend:${IMAGE_TAG:-latest}
      container_name: frontend
      restart: unless-stopped

   # DATABASE
   mysql:
      image: mysql:8
      container_name: mysql
      restart: unless-stopped

      environment:
         - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
         - MYSQL_DATABASE=${DB_NAME}
      volumes:
         - mysql_data:/var/lib/mysql
      healthcheck:
         test:
            [
               "CMD-SHELL",
               "mysqladmin ping -h localhost -u root -p${DB_PASSWORD}",
            ]
         interval: 10s
         timeout: 5s
         retries: 5

volumes:
   mysql_data:

networks:
   default:
      name: practice_security_nest_network
