# Serves the built SPA. Does NOT proxy /api — in production Traefik routes
# /api to the API container at the host level (same-origin topology).
# server {
#     # ecoute le port 80 standard + attrape nom de domaine
#     listen 80;
#     server_name _;

#     # indique ou ce trouve les fichier sur le disque , index.html  = point d'entrer de l'application
#     root /usr/share/nginx/html;
#     index index.html;

#     # compression
#     gzip on;
#     gzip_types text/plain text/css application/javascript text/xml application/xml application/xml+rss text/javascript;

#     # dit au navigateur de mettre en cache les fichiers avec ces extensions , pendant 1 ans , et que le fichier ne changera jamais ( immutable )
#     # fonctionne car vite/webpack gère la mise a jour des contenus
#     location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
#         expires 1y;
#         add_header Cache-Control "public, immutable";        
#     }

#     # dit a nginx d essayer dans l'ordre ces urls
#     location / {
#         try_files $uri $uri/ /index.html;
#     }
# }

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name monapp.com www.monapp.com;

        # Chemin pour la vérification Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Serveur HTTPS principal
    server {
        listen 443 ssl http2;
        server_name monapp.com www.monapp.com;

        # Certificats SSL
        ssl_certificate     /etc/letsencrypt/live/monapp.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/monapp.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Headers de sécurité
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # API → NestJS backend
        location /api/ {
            proxy_pass http://backend:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Frontend React — fichiers statiques
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
        }
    }
}
